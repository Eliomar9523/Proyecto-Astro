name: Deploy Astro site to GitHub Pages

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 22
          check-latest: true

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Deploy with Astro official action
        uses: withastro/action@v2
        with:
          path: ./dist
          package-manager: npm






